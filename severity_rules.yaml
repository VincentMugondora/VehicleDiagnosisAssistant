# Deterministic Severity Rules Configuration
# Version: 1.0.0
# Date: 2026-07-10
#
# This file defines severity classifications for diagnostic trouble codes.
# Rules can be updated without changing application code.
#
# Severity Levels:
#   Critical: Safety systems, immediate danger, vehicle inoperable
#   High: Engine damage risk, significant performance loss, urgent repair
#   Moderate: Performance impact, emissions issues, moderate urgency
#   Low: Minor issues, informational, low urgency

# Category-based default rules
categories:
  # CRITICAL - Safety systems
  BRAKE_SYSTEM:
    default: Critical
    reasoning: Brake system failure poses immediate safety risk
    examples: [C0035, C0040, C0045]

  ABS:
    default: Critical
    reasoning: Anti-lock brake system affects vehicle control
    examples: [C0041, C0050, C0060]

  AIRBAG_SRS:
    default: Critical
    reasoning: Safety restraint system failure in crash
    examples: [B0001, B0010, B0020]

  STEERING:
    default: Critical
    reasoning: Steering system failure affects vehicle control
    examples: [C0460, C0461, C0899]

  OIL_PRESSURE:
    default: Critical
    reasoning: Low oil pressure can cause immediate engine damage
    examples: [P0520, P0521, P0522]

  COOLANT_OVERHEATING:
    default: Critical
    reasoning: Engine overheating can cause immediate damage
    examples: [P0217, P0218, P0219]

  # HIGH - Engine damage risk
  MISFIRE_DETECTED:
    default: High
    reasoning: Misfires can damage catalytic converter and engine
    examples: [P0300, P0301, P0302, P0303, P0304, P0305, P0306, P0307, P0308]

  KNOCK_SENSOR:
    default: High
    reasoning: Undetected knock can cause engine damage
    examples: [P0325, P0326, P0327, P0328]

  TIMING_SYSTEM:
    default: High
    reasoning: Timing issues can cause valve/piston damage
    examples: [P0016, P0017, P0018]

  TURBO_SUPERCHARGER:
    default: High
    reasoning: Forced induction failure can damage engine
    examples: [P0234, P0235, P0236, P0237, P0238]

  FUEL_PRESSURE_LOW:
    default: High
    reasoning: Low fuel pressure can cause lean condition and damage
    examples: [P0087, P0088, P0089]

  TRANSMISSION_FAILURE:
    default: High
    reasoning: Transmission failure causes major repair expense
    examples: [P0700, P0735, P0740]

  # MODERATE - Performance/emissions impact
  EVAP_SYSTEM:
    default: Moderate
    reasoning: Emissions system, rarely affects drivability
    examples: [P0440, P0441, P0442, P0443, P0446, P0450, P0451, P0452, P0453, P0455, P0456, P0457]

  O2_SENSOR:
    default: Moderate
    reasoning: Affects fuel trim and emissions, not immediate damage
    examples: [P0130, P0131, P0132, P0133, P0134, P0135, P0136, P0137, P0138, P0140, P0141, P0150, P0151, P0152, P0153, P0154, P0155, P0156, P0157, P0158]

  CATALYST_EFFICIENCY:
    default: Moderate
    reasoning: Emissions issue, catalyst already damaged
    examples: [P0420, P0430, P0421, P0431]

  MAF_MAP_SENSOR:
    default: Moderate
    reasoning: Sensor issue affects performance, not critical
    examples: [P0100, P0101, P0102, P0103, P0104, P0105, P0106, P0107, P0108]

  FUEL_TRIM:
    default: Moderate
    reasoning: Indicates lean/rich condition needing diagnosis
    examples: [P0171, P0172, P0174, P0175]

  EGR_SYSTEM:
    default: Moderate
    reasoning: Emissions system, moderate performance impact
    examples: [P0400, P0401, P0402, P0403, P0404, P0405]

  THERMOSTAT:
    default: Moderate
    reasoning: Affects engine warmup and efficiency
    examples: [P0125, P0128, P0126]

  IDLE_CONTROL:
    default: Moderate
    reasoning: Idle quality issue, not critical
    examples: [P0505, P0506, P0507, P0508, P0509]

  VVT_CAM_TIMING:
    default: Moderate
    reasoning: Variable valve timing performance issue
    examples: [P0010, P0011, P0012, P0013, P0014, P0015, P0016, P0017, P0018, P0019]

  SENSOR_CIRCUIT:
    default: Moderate
    reasoning: Sensor circuit issue, not actual component failure
    examples: []  # Pattern-based, not specific codes

  # LOW - Minor issues
  MONITOR_NOT_READY:
    default: Low
    reasoning: Informational, not actual malfunction
    examples: [P1000]

  FUEL_CAP:
    default: Low
    reasoning: Usually just loose fuel cap
    examples: [P0457, P0458]

# Code-specific overrides (when specific DTC differs from category default)
overrides:
  P0455:
    severity: Moderate
    reasoning: Large EVAP leak may affect drivability

  P0420:
    severity: Moderate
    reasoning: Catalyst efficiency below threshold - already damaged

  P0430:
    severity: Moderate
    reasoning: Catalyst efficiency below threshold - already damaged

  P0128:
    severity: Moderate
    reasoning: Thermostat issue affects warmup time

  P0300:
    severity: High
    reasoning: Random/multiple cylinder misfire - diagnose urgently

  P0217:
    severity: Critical
    reasoning: Engine coolant over-temperature - stop immediately

  P0218:
    severity: Critical
    reasoning: Transmission fluid over-temperature - stop immediately

  P0522:
    severity: Critical
    reasoning: Engine oil pressure sensor low - verify actual pressure

# Pattern-based rules (for codes not explicitly listed)
patterns:
  # EVAP codes (P04xx range)
  - prefix: P04
    keywords: [evap, purge, vent]
    severity: Moderate
    reasoning: EVAP system - emissions primarily, rarely drivability

  # O2 sensor codes (P01xx range)
  - prefix: P01
    keywords: [o2, oxygen, sensor]
    severity: Moderate
    reasoning: O2 sensor issue - affects fuel trim and emissions

  # Misfire codes (P030x)
  - prefix: P030
    keywords: [misfire]
    severity: High
    reasoning: Misfire can damage catalytic converter
    exceptions:
      - keywords: [circuit]
        severity: Moderate
        reasoning: Misfire detection circuit issue

  # Sensor circuit codes
  - keywords: [sensor circuit, circuit range]
    severity: Moderate
    reasoning: Sensor circuit issue - electrical/sensor problem

  # Brake system codes
  - keywords: [brake, abs, anti-lock]
    severity: Critical
    reasoning: Brake/ABS system affects vehicle safety

  # Airbag codes
  - keywords: [airbag, srs, restraint]
    severity: Critical
    reasoning: Safety restraint system failure

# Terminology standardization
standardization:
  Medium: Moderate  # Replace "Medium" with "Moderate"

